name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Ekstrak File ZIP
      run: unzip jamtugas.zip -d project_folder
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Berikan Izin Gradle
      run: |
        cd project_folder
        chmod +x gradlew

    - name: Build APK dengan Gradle
      run: |
        cd project_folder
        ./gradlew assembleDebug

    - name: Upload APK Hasil Build
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-JamTugas
        path: project_folder/app/build/outputs/apk/debug/app-debug.apk
